<!doctype html>
<html lang="tr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		<!-- PWA — manifest linki global DEĞİL: /devam (personel basış) için root layout'ta
		     koşullu eklenir. /devam kendi kişisel (token'lı) manifest'ini verir; aksi halde
		     "Ana Ekrana Ekle" start_url="/" yüzünden login ekranına gidiyordu. -->
		<meta name="theme-color" content="#0d9488" />

		<!-- Favicon -->
		<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

		<!-- iOS PWA -->
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Sprenses" />

		<!-- NOT: Global "Travelpayouts site doğrulama" (tp-em.com) script'i 2026-06-22'de
		     KALDIRILDI. Üçüncü-taraf link-monetizasyon script'iydi; her kimlik-doğrulamalı
		     sayfada (finans/İK/cari) çalışıp uygulama-içi tıklamaları affiliate linklerine
		     (klook vb.) yönlendiriyor ve obfuscated 3rd-party kodu hassas DOM'a sokuyordu.
		     Uçak rezervasyon sayfası kendi tp.media widget'ını ayrıca yükler — bu kaldırma
		     onu etkilemez. Tekrar EKLENMEMELİDİR (güvenlik/UX regresyonu). -->

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
